# 质量基线(2026-07-18):后端类型检查。
# 策略:先建"门禁"而非一步到严格,随团队熟练度逐步收紧。
[mypy]
python_version = 3.10
warn_unused_ignores = False
warn_redundant_casts = True
check_untyped_defs = True
disallow_untyped_defs = False
ignore_missing_imports = True
exclude = (?x)(node_modules|venv|\.venv|dist|build)

# 测试目录不强制类型(pytest/TestClient 噪音多)
[mypy-tests.*]
ignore_errors = True
