server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA 历史回退(刷新不出 404)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 业务 API 反向代理(含 SSE 流式)。注意 proxy_pass 末尾不要加 /,
    # 以保留 /api 前缀转发到 business 的 /api 路由。
    location /api/ {
        proxy_pass http://business:7101;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 关键:关闭缓冲,保证 token 实时下发
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # 鉴权接口(登录/注册/登出)反向代理到 business(与 /api 同源,Cookie 随请求携带)
    location /auth/ {
        proxy_pass http://business:7101;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
    }
}
