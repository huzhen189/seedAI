# SeedAI 本地 bare 域名反代配置(开发用)
# 前置:
#   - hosts 已映射 seedai.huzhen.net.cn / seedapi.huzhen.net.cn -> 127.0.0.1
#   - 前端 vite dev 监听 7100, 业务监听 7101
#   - 以管理员运行 nginx(绑定 80)
# 启动: nginx -c <此文件绝对路径> -p <此文件所在目录>
# 停止: nginx -c <此文件绝对路径> -s stop

events {
    worker_connections 1024;
}

http {
    upstream frontend { server 127.0.0.1:7100; }
    upstream business { server 127.0.0.1:7101; }

    # 主站: 前端 SPA + 同源业务 API
    server {
        listen 80;
        server_name seedai.huzhen.net.cn;

        # 前端 SPA(vite dev, 含 HMR websocket)
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 业务 API(SSE 流式)
        location /api/ {
            proxy_pass http://business;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            chunked_transfer_encoding on;
        }

        # 鉴权(登录/注册/登出), 同源 Cookie 随请求携带
        location /auth/ {
            proxy_pass http://business;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
        }
    }

    # 后端 bare 域名(API 调试直连)
    server {
        listen 80;
        server_name seedapi.huzhen.net.cn;

        location / {
            proxy_pass http://business;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }
    }
}
